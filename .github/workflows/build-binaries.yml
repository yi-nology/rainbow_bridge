name: Build Binaries

on:
  workflow_call:
    inputs:
      base_path:
        description: 'Base path for deployment'
        required: false
        default: ''
        type: string
    outputs:
      artifact_name_prefix:
        description: 'Prefix for uploaded artifacts'
        value: ${{ jobs.build-binaries.outputs.artifact_name_prefix }}

env:
  RUN_NAME: rainbow_bridge

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            bin_ext: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            bin_ext: ""
          - goos: windows
            goarch: amd64
            archive: zip
            bin_ext: ".exe"
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            bin_ext: ""
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            bin_ext: ""
    
    outputs:
      artifact_name_prefix: ${{ env.RUN_NAME }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue/package-lock.json

      - name: Build Vue frontend
        env:
          BASE_PATH: ${{ inputs.base_path }}
        run: |
          cd vue
          npm ci
          if [ -n "$BASE_PATH" ]; then
            export VITE_BASE_PATH="/${BASE_PATH}/"
          else
            export VITE_BASE_PATH="/"
          fi
          npm run build
          cd ..

      - name: Copy frontend to static directory
        run: |
          rm -rf pkg/static/web/*
          mkdir -p pkg/static/web
          cp -r vue/dist/* pkg/static/web/
          echo "Static files prepared for embedding"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Configure environment
        run: |
          echo "GOOS=${{ matrix.goos }}" >> "$GITHUB_ENV"
          echo "GOARCH=${{ matrix.goarch }}" >> "$GITHUB_ENV"
          echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "GIT_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build server binary (API only)
        env:
          CGO_ENABLED: 0
        run: |
          NAME="${{ env.RUN_NAME }}-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_DIR="./dist/${NAME}"
          mkdir -p "$OUTPUT_DIR"
          go build \
            -ldflags="-X 'main.Version=${{ env.VERSION }}' -X 'main.GitCommit=${{ env.GIT_COMMIT }}' -X 'main.BuildTime=${{ env.BUILD_TIME }}'" \
            -o "$OUTPUT_DIR/server${{ matrix.bin_ext }}" ./cmd/server
          cp config.yaml "$OUTPUT_DIR/config.yaml"
          cp -r deploy "$OUTPUT_DIR/deploy"

      - name: Build app binary (with frontend)
        env:
          CGO_ENABLED: 0
          BASE_PATH: ${{ inputs.base_path }}
        run: |
          NAME="${{ env.RUN_NAME }}-app-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_DIR="./dist/${NAME}"
          mkdir -p "$OUTPUT_DIR"
          go build \
            -ldflags="-X 'main.Version=${{ env.VERSION }}' -X 'main.GitCommit=${{ env.GIT_COMMIT }}' -X 'main.BuildTime=${{ env.BUILD_TIME }}' -X 'main.BasePath=${{ env.BASE_PATH }}'" \
            -o "$OUTPUT_DIR/app${{ matrix.bin_ext }}" ./cmd/app
          cp config.yaml "$OUTPUT_DIR/config.yaml"
          cp -r deploy "$OUTPUT_DIR/deploy"
          cp -r pkg/static/web "$OUTPUT_DIR/web"

      - name: Package artifacts
        run: |
          cd dist
          for dir in */; do
            NAME="${dir%/}"
            if [ "${{ matrix.archive }}" = "zip" ]; then
              zip -rq "${NAME}.zip" "${NAME}"
            else
              tar czf "${NAME}.tar.gz" "${NAME}"
            fi
            rm -rf "${NAME}"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: "${{ env.RUN_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          path: dist/*

  build-frontend-archive:
    name: Build Frontend Archive
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue/package-lock.json

      - name: Build Vue frontend
        env:
          BASE_PATH: ${{ inputs.base_path }}
        run: |
          cd vue
          npm ci
          if [ -n "$BASE_PATH" ]; then
            export VITE_BASE_PATH="/${BASE_PATH}/"
          else
            export VITE_BASE_PATH="/"
          fi
          npm run build
          cd ..

      - name: Create frontend archive
        run: |
          mkdir -p dist
          cd vue/dist
          tar czf ../../dist/frontend.tar.gz .
          cd ../..
          cd vue/dist
          zip -rq ../../dist/frontend.zip .
          cd ../..

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-archive
          path: dist/*
