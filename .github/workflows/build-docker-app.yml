name: Build Docker App

on:
  workflow_call:
    inputs:
      base_path:
        description: 'Base path for deployment'
        required: false
        default: ''
        type: string
      version:
        description: 'Version tag'
        required: true
        type: string
      git_commit:
        description: 'Git commit SHA'
        required: true
        type: string
      build_time:
        description: 'Build timestamp'
        required: true
        type: string
    outputs:
      app_image_tags:
        description: 'Tags for App Docker image'
        value: ${{ jobs.docker-app.outputs.app_image_tags }}

env:
  IMAGE_NAME: ghcr.io/yi-nology/rainbow_bridge-app

jobs:
  docker-app:
    name: Build and Push App Image
    runs-on: ubuntu-latest
    
    outputs:
      app_image_tags: ${{ steps.meta-app.outputs.tags }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (App)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          target: app
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          build-args: |
            GO_VERSION=1.24
            BASE_PATH=${{ inputs.base_path }}
            VERSION=${{ inputs.version }}
            GIT_COMMIT=${{ inputs.git_commit }}
            BUILD_TIME=${{ inputs.build_time }}
