name: Build Docker API

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      base_path:
        description: 'Base path for deployment'
        required: false
        default: ''
        type: string
      version:
        description: 'Version tag'
        required: true
        type: string
      git_commit:
        description: 'Git commit SHA'
        required: true
        type: string
      build_time:
        description: 'Build timestamp'
        required: true
        type: string
    outputs:
      api_image_tags:
        description: 'Tags for API Docker image'
        value: ${{ jobs.docker-api.outputs.api_image_tags }}

env:
  IMAGE_NAME: ghcr.io/yi-nology/rainbow_bridge

jobs:
  docker-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    
    outputs:
      api_image_tags: ${{ steps.meta-api.outputs.tags }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          target: api
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            GO_VERSION=1.25
            VERSION=${{ inputs.version }}
            GIT_COMMIT=${{ inputs.git_commit }}
            BUILD_TIME=${{ inputs.build_time }}
            BASE_PATH=${{ inputs.base_path }}
