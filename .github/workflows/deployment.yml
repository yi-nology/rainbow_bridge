name: Deployment Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'deploy/**'
      - 'Dockerfile'
      - '.github/workflows/deployment.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'deploy/**'
      - 'Dockerfile'

env:
  BASE_PATH: "rainbow-bridge"

jobs:
  # Docker Compose SQLite Deployment Test
  docker-compose-sqlite:
    name: Docker Compose (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rainbow-bridge-api:test
          target: api
          build-args: |
            GO_VERSION=1.24
            BASE_PATH=${{ env.BASE_PATH }}
            VERSION=test
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
      
      - name: Build Frontend image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rainbow-bridge-frontend:test
          target: frontend
          build-args: |
            GO_VERSION=1.24
            BASE_PATH=${{ env.BASE_PATH }}
      
      - name: Prepare SQLite Docker Compose
        run: |
          cp deploy/docker-compose/config.yaml deploy/docker-compose/sqlite/config.yaml
          ls -la deploy/docker-compose/sqlite/
      
      - name: Start Docker Compose (SQLite)
        working-directory: deploy/docker-compose/sqlite
        run: docker compose -f docker-compose.yaml -p rainbow-sqlite up -d
      
      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          sleep 45
          echo "Checking running containers..."
          docker ps -a
          echo "Checking container logs..."
          docker compose -f deploy/docker-compose/sqlite/docker-compose.yaml -p rainbow-sqlite logs --tail=20
          echo "Checking port mappings..."
          docker port rainbow-sqlite-rainbow-bridge-frontend || true
      
      - name: Health Check
        run: |
          echo "Attempting health check on port 80..."
          for i in {1..5}; do
            echo "Attempt $i..."
            if curl -f http://localhost:80/rainbow-bridge/ping; then
              echo "✓ Health check passed!"
              exit 0
            fi
            echo "Health check failed, retrying in 10s... ($i/5)"
            sleep 10
          done
          echo "✗ Health check failed after all attempts"
          echo "=== Frontend container logs ==="
          docker compose -f deploy/docker-compose/sqlite/docker-compose.yaml -p rainbow-sqlite logs rainbow-bridge-frontend
          echo "=== API container logs ==="
          docker compose -f deploy/docker-compose/sqlite/docker-compose.yaml -p rainbow-sqlite logs rainbow-bridge-api
          exit 1
      
      - name: Verify API Endpoint
        run: |
          response=$(curl -s http://localhost:80/rainbow-bridge/api/v1/version)
          echo "Version response: $response"
          if echo "$response" | grep -q "version"; then
            echo "✓ API endpoint is working"
          else
            echo "✗ API endpoint failed"
            exit 1
          fi
      
      - name: Check Logs
        if: failure()
        working-directory: deploy/docker-compose/sqlite
        run: docker compose -f docker-compose.yaml -p rainbow-sqlite logs
      
      - name: Stop Docker Compose (SQLite)
        if: always()
        working-directory: deploy/docker-compose/sqlite
        run: docker compose -f docker-compose.yaml -p rainbow-sqlite down -v
  
  # Docker Compose MySQL Deployment Test
  docker-compose-mysql:
    name: Docker Compose (MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rainbow-bridge-api:test
          target: api
          build-args: |
            GO_VERSION=1.24
            BASE_PATH=${{ env.BASE_PATH }}
      
      - name: Build Frontend image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rainbow-bridge-frontend:test
          target: frontend
          build-args: |
            GO_VERSION=1.24
            BASE_PATH=${{ env.BASE_PATH }}
      
      - name: Prepare MySQL Docker Compose
        run: |
          cp deploy/docker-compose/config.yaml deploy/docker-compose/mysql/config.yaml
      
      - name: Start Docker Compose (MySQL)
        working-directory: deploy/docker-compose/mysql
        run: docker compose -f docker-compose.yaml -p rainbow-mysql up -d
      
      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL and service to start..."
          echo "Checking running containers..."
          docker ps -a
          sleep 90
          echo "Service should be ready now"
          docker compose -f deploy/docker-compose/mysql/docker-compose.yaml -p rainbow-mysql logs --tail=30
      
      - name: Health Check (MySQL)
        run: |
          echo "Attempting MySQL health check on port 80..."
          for i in {1..5}; do
            echo "Attempt $i..."
            if curl -f http://localhost:80/rainbow-bridge/ping; then
              echo "✓ MySQL health check passed!"
              exit 0
            fi
            echo "Health check failed, retrying in 10s... ($i/5)"
            sleep 10
          done
          echo "✗ MySQL health check failed after all attempts"
          echo "=== Frontend container logs ==="
          docker compose -f deploy/docker-compose/mysql/docker-compose.yaml -p rainbow-mysql logs rainbow-bridge-frontend
          echo "=== API container logs ==="
          docker compose -f deploy/docker-compose/mysql/docker-compose.yaml -p rainbow-mysql logs rainbow-bridge-api
          exit 1
      
      - name: Verify API Endpoint
        run: |
          response=$(curl -s http://localhost:80/rainbow-bridge/api/v1/version)
          echo "Version response: $response"
          if echo "$response" | grep -q "version"; then
            echo "✓ MySQL deployment is working"
          else
            echo "✗ MySQL deployment failed"
            exit 1
          fi
      
      - name: Check Logs
        if: failure()
        working-directory: deploy/docker-compose/mysql
        run: docker compose -f docker-compose.yaml -p rainbow-mysql logs
      
      - name: Stop Docker Compose (MySQL)
        if: always()
        working-directory: deploy/docker-compose/mysql
        run: docker compose -f docker-compose.yaml -p rainbow-mysql down -v
  
  # Kubernetes Standalone Deployment Test
  kubernetes-standalone:
    name: Kubernetes (Standalone)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
      
      - name: Build API image for minikube
        run: |
          docker build -t rainbow-bridge-api:k8s --target api \
            --build-arg GO_VERSION=1.24 \
            --build-arg BASE_PATH=${{ env.BASE_PATH }} \
            --build-arg VERSION=test \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            .
          minikube image load rainbow-bridge-api:k8s
      
      - name: Build Frontend image for minikube
        run: |
          docker build -t rainbow-bridge-frontend:k8s --target frontend \
            --build-arg GO_VERSION=1.24 \
            --build-arg BASE_PATH=${{ env.BASE_PATH }} \
            .
          minikube image load rainbow-bridge-frontend:k8s
      
      - name: Deploy to Kubernetes
        run: |
          cd deploy/kubernetes/standalone
          # Create namespace first
          kubectl create namespace rainbow-test --dry-run=client -o yaml | kubectl apply -f -
          # Replace placeholders and apply
          sed -e "s/__NAMESPACE__/rainbow-test/g" \
              -e "s|__PV_HOST_PATH__|/tmp/rainbow-bridge/rainbow-test|g" \
              -e "s|ghcr.io/yi-nology/rainbow_bridge-api:latest|rainbow-bridge-api:k8s|g" \
              -e "s|ghcr.io/yi-nology/rainbow_bridge-frontend:latest|rainbow-bridge-frontend:k8s|g" \
              -e "s|imagePullPolicy: Always|imagePullPolicy: Never|g" \
              rainbow-bridge.yaml | kubectl apply -f -

      - name: Wait for pods to be ready
        run: |
          kubectl wait -n rainbow-test --for=condition=ready pod -l 'app=rainbow-bridge,!component' --timeout=120s
          kubectl wait -n rainbow-test --for=condition=ready pod -l 'app=rainbow-bridge,component=frontend' --timeout=120s
          kubectl get pods -n rainbow-test

      - name: Port Forward
        run: |
          kubectl port-forward -n rainbow-test svc/rainbow-bridge-frontend 8080:80 &
          sleep 5

      - name: Health Check
        run: |
          curl -f http://localhost:8080/rainbow-bridge/ping || exit 1

      - name: Verify API Endpoint
        run: |
          response=$(curl -s http://localhost:8080/rainbow-bridge/api/v1/version)
          echo "Version response: $response"
          if echo "$response" | grep -q "version"; then
            echo "✓ Kubernetes deployment is working"
          else
            echo "✗ Kubernetes deployment failed"
            exit 1
          fi

      - name: Check Pod Logs
        if: failure()
        run: |
          kubectl logs -n rainbow-test -l 'app=rainbow-bridge,!component'
          kubectl logs -n rainbow-test -l 'app=rainbow-bridge,component=frontend'

      - name: Cleanup Kubernetes
        if: always()
        run: |
          kubectl delete namespace rainbow-test --ignore-not-found=true || true
          kubectl delete storageclass rainbow-bridge-local-storage --ignore-not-found=true || true
          minikube stop || true
