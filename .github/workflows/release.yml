name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # Call reusable workflow for building binaries
  build-binaries:
    uses: ./.github/workflows/build-binaries.yml
    with:
      base_path: "rainbow-bridge"

  # Call reusable workflow for building Docker API image
  build-docker-api:
    uses: ./.github/workflows/build-docker-api.yml
    with:
      base_path: "rainbow-bridge"
      version: ${{ github.ref_name }}
      git_commit: ${{ github.sha }}
      build_time: ${{ github.event.head_commit.timestamp }}

  # Call reusable workflow for building Docker Frontend image
  build-docker-frontend:
    uses: ./.github/workflows/build-docker-frontend.yml
    with:
      base_path: "rainbow-bridge"

  # Create GitHub Release with binary artifacts
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.{tar.gz,zip}
