version: "3.9"

# Default deployment with SQLite (simplest setup, no Redis)
# For other database options, see subdirectories:
# - sqlite/    (SQLite + Redis)
# - mysql/     (MySQL 8.0 + Redis)
# - postgres/  (PostgreSQL 16 + Redis)

services:
  rainbow-bridge-api:
    image: ghcr.io/yi-nology/rainbow_bridge-api:latest
    container_name: rainbow-bridge-api
    restart: unless-stopped
    command:
      - "--config"
      - "/etc/rainbow_bridge/config.yaml"
    environment:
      TZ: Asia/Shanghai
    expose:
      - "8080"
    volumes:
      - ./config.yaml:/etc/rainbow_bridge/config.yaml:ro
      - rainbow_bridge_data:/var/lib/rainbow_bridge
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/rainbow-bridge/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rainbow-bridge-frontend:
    image: ghcr.io/yi-nology/rainbow_bridge-frontend:latest
    container_name: rainbow-bridge-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      rainbow-bridge-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/rainbow-bridge/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rainbow_bridge_data:
    driver: local
