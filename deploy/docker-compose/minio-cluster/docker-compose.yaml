version: '3.8'

services:
  rainbow-bridge-api:
    image: ghcr.io/yi-nology/rainbow-bridge-api:latest
    container_name: rainbow-bridge-api
    ports:
      - "80:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - GIN_MODE=release
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rainbow_bridge
      - DATABASE_USER=rainbow_bridge
      - DATABASE_PASSWORD=rainbow_bridge_pass
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio1:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=rainbow-bridge
    restart: unless-stopped
    depends_on:
      - postgres
      - minio1
      - minio2
      - minio3
      - minio4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16
    container_name: rainbow-bridge-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=rainbow_bridge
      - POSTGRES_USER=rainbow_bridge
      - POSTGRES_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rainbow_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio1:
    image: minio/minio:latest
    container_name: minio1
    ports:
      - "9001:9000"
      - "9011:9001"
    volumes:
      - minio1_data:/data1
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server http://minio{1...4}:9000/data{1...4} --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio2:
    image: minio/minio:latest
    container_name: minio2
    ports:
      - "9002:9000"
      - "9012:9001"
    volumes:
      - minio2_data:/data2
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server http://minio{1...4}:9000/data{1...4} --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio3:
    image: minio/minio:latest
    container_name: minio3
    ports:
      - "9003:9000"
      - "9013:9001"
    volumes:
      - minio3_data:/data3
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server http://minio{1...4}:9000/data{1...4} --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio4:
    image: minio/minio:latest
    container_name: minio4
    ports:
      - "9004:9000"
      - "9014:9001"
    volumes:
      - minio4_data:/data4
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server http://minio{1...4}:9000/data{1...4} --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: rainbow-bridge-minio-init
    depends_on:
      - minio1
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set minio http://minio1:9000 minioadmin minioadmin123;
      mc mb --ignore-existing minio/rainbow-bridge;
      mc policy set public minio/rainbow-bridge;
      exit 0;
      "

volumes:
  postgres_data:
  minio1_data:
  minio2_data:
  minio3_data:
  minio4_data:
