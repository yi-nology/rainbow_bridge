version: '3.8'

services:
  rainbow-bridge-api:
    image: ghcr.io/yi-nology/rainbow-bridge-api:latest
    container_name: rainbow-bridge-api
    ports:
      - "80:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - GIN_MODE=release
      - DATABASE_TYPE=mysql
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_NAME=rainbow_bridge
      - DATABASE_USER=rainbow_bridge
      - DATABASE_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: rainbow-bridge-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=rainbow_bridge
      - MYSQL_USER=rainbow_bridge
      - MYSQL_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
