services:
  postgres:
    image: postgres:16
    container_name: rainbow-bridge-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=rainbow_bridge
      - POSTGRES_USER=rainbow_bridge
      - POSTGRES_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rainbow_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: rainbow-bridge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: rainbow-bridge-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set minio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing minio/rainbow-bridge;
      mc anonymous set public minio/rainbow-bridge;
      mc ls minio/rainbow-bridge;
      exit 0;
      "

  rainbow-bridge:
    build:
      context: ../../..
      target: app
    container_name: rainbow-bridge
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - rainbow_bridge_data:/app/data
    environment:
      - GIN_MODE=release
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rainbow_bridge
      - DATABASE_USER=rainbow_bridge
      - DATABASE_PASSWORD=rainbow_bridge_pass
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=rainbow-bridge
    depends_on:
      - postgres
      - minio
      - minio-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  rainbow_bridge_data:
