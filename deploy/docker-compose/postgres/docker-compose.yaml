version: '3.8'

services:
  rainbow-bridge-api:
    image: ghcr.io/yi-nology/rainbow-bridge-api:latest
    container_name: rainbow-bridge-api
    ports:
      - "80:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - GIN_MODE=release
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rainbow_bridge
      - DATABASE_USER=rainbow_bridge
      - DATABASE_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16
    container_name: rainbow-bridge-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=rainbow_bridge
      - POSTGRES_USER=rainbow_bridge
      - POSTGRES_PASSWORD=rainbow_bridge_pass
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rainbow_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
