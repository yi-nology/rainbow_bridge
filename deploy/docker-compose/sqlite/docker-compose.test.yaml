version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: rainbow-test-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      TZ: Asia/Shanghai

  rainbow-test-api:
    image: rainbow-bridge-api:test
    restart: unless-stopped
    command:
      - "--config"
      - "/etc/rainbow_bridge/config.yaml"
    environment:
      TZ: Asia/Shanghai
    expose:
      - "8080"
    volumes:
      - ./config.yaml:/etc/rainbow_bridge/config.yaml:ro
      - rainbow_test_data:/var/lib/rainbow_bridge
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/rainbow-bridge/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_test_data:
    driver: local
  rainbow_test_data:
    driver: local
