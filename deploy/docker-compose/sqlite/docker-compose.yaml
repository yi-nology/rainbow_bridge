version: '3.8'

services:
  rainbow-bridge-api:
    image: ghcr.io/yi-nology/rainbow-bridge-api:latest
    container_name: rainbow-bridge-api
    ports:
      - "80:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      - GIN_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
