apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  labels:
    app: minio-init
spec:
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-minio
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for MinIO to be ready..."
          until wget -qO- http://minio:9000/minio/health/ready; do
            echo "MinIO is not ready yet. Retrying in 5 seconds..."
            sleep 5
          done
          echo "MinIO is ready!"
      containers:
      - name: minio-init
        image: minio/mc:latest
        command:
        - sh
        - -c
        - |
          echo "Configuring MinIO..."
          mc alias set minio http://minio:9000 minioadmin minioadmin123
          echo "Creating bucket rainbow-bridge..."
          mc mb --ignore-existing minio/rainbow-bridge
          echo "Setting bucket policy to public..."
          mc anonymous set public minio/rainbow-bridge
          echo "Listing bucket contents..."
          mc ls minio/rainbow-bridge
          echo "MinIO initialization completed!"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
  backoffLimit: 4