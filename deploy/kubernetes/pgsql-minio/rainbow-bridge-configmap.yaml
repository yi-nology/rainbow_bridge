apiVersion: v1
kind: ConfigMap
metadata:
  name: rainbow-bridge-config
data:
  config.yaml: |
    server:
      port: 8080
      host: 0.0.0.0
    database:
      type: postgres
      host: postgres
      port: 5432
      name: rainbow_bridge
      user: rainbow_bridge
      password: rainbow_bridge_pass
    storage:
      type: minio
      endpoint: minio:9000
      access_key: minioadmin
      secret_key: minioadmin123
      bucket: rainbow-bridge
    logging:
      level: info
    security:
      jwt_secret: your-secret-key-here
