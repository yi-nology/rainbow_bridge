apiVersion: v1
kind: ConfigMap
metadata:
  name: rainbow-bridge-config
data:
  config.yaml: |
    server:
      port: 8080
      host: 0.0.0.0
    database:
      type: sqlite
      path: /app/data/rainbow_bridge.db
    storage:
      type: local
      path: /app/data
    logging:
      level: info
    security:
      jwt_secret: your-secret-key-here
