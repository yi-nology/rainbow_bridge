# Rainbow Bridge Nginx 反向代理配置

upstream rainbow_bridge {
    server localhost:8080;
}

server {
    listen 80;
    server_name localhost;

    # 访问日志
    access_log /var/log/nginx/rainbow-bridge-access.log;
    error_log /var/log/nginx/rainbow-bridge-error.log;

    # 静态文件路径（如果前端文件部署在 Nginx 中）
    # root /path/to/frontend/build;

    # 反向代理配置
    location / {
        proxy_pass http://rainbow_bridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 处理 WebSocket 连接
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康检查
    location /api/ping {
        proxy_pass http://rainbow_bridge;
        proxy_set_header Host $host;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
