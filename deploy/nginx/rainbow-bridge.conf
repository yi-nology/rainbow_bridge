# 独立 Nginx 反向代理配置（适用于非 Docker 部署场景）
# Docker 部署请使用 frontend.conf
server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 10k;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    # 允许上传大文件（最大100MB）
    client_max_body_size 100M;

    # API 反向代理 -> Go 后端
    location /rainbow-bridge/api/ {
        proxy_pass http://rainbow-bridge-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ping 健康检查代理到后端
    location /rainbow-bridge/ping {
        proxy_pass http://rainbow-bridge-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 302 $scheme://$http_host/rainbow-bridge/;
    }
}
