<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="16.6%" style="stop-color:#FF7F00;stop-opacity:1" />
      <stop offset="33.3%" style="stop-color:#FFFF00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00FF00;stop-opacity:1" />
      <stop offset="66.6%" style="stop-color:#0000FF;stop-opacity:1" />
      <stop offset="83.3%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9400D3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bridge arch -->
  <path d="M 10 70 Q 50 10 90 70" stroke="url(#rainbow-gradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Bridge deck -->
  <rect x="15" y="70" width="70" height="8" fill="#333" rx="2"/>
  
  <!-- Support pillars -->
  <rect x="25" y="78" width="6" height="15" fill="#666"/>
  <rect x="69" y="78" width="6" height="15" fill="#666"/>
  
  <!-- Clouds -->
  <ellipse cx="20" cy="30" rx="12" ry="8" fill="#FFF" opacity="0.8"/>
  <ellipse cx="80" cy="25" rx="10" ry="7" fill="#FFF" opacity="0.8"/>
</svg>
